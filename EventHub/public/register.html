<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – EventHub</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-bg-glow"></div>
  <div class="auth-bg-glow auth-bg-glow-2"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🎯</div>
      <h1>EventHub</h1>
    </div>

    <h2 class="auth-heading">Create account</h2>
    <p class="auth-subheading">Join the EventHub platform</p>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input id="name" type="text" class="form-control" placeholder="Ahmed Al-Rashid" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input id="email" type="email" class="form-control" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-control" placeholder="Min 8 characters" required minlength="8"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="role">Account Type</label>
        <select id="role" class="form-control">
          <option value="User">Attendee (User)</option>
          <option value="Sponsor">Sponsor</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="reg-btn">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.textContent = 'Creating…'; btn.disabled = true;

    const res = await api.post('/register', {
      name:     document.getElementById('name').value,
      email:    document.getElementById('email').value,
      password: document.getElementById('password').value,
      role:     document.getElementById('role').value,
    });

    if (res.ok) {
      localStorage.setItem('token', res.data.token);
      localStorage.setItem('user', JSON.stringify(res.data.user));
      showToast('Account created! Redirecting…', 'success');
      const map = { 'Admin': '/admin/dashboard.html', 'Event Manager': '/manager/dashboard.html', 'Sponsor': '/sponsor/dashboard.html' };
      setTimeout(() => { window.location.href = map[res.data.user.role] || '/login.html'; }, 800);
    } else {
      const msg = res.data?.errors ? Object.values(res.data.errors).flat().join(', ') : res.data?.message || 'Registration failed';
      showToast(msg, 'error');
      btn.textContent = 'Create Account'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
