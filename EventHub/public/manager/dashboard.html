<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager Dashboard – EventHub</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🎯</div><span>EventHub</span></div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Overview</span>
      <a class="nav-item active" href="/manager/dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <span class="nav-section-label">Events</span>
      <a class="nav-item" href="/manager/events.html"><span class="nav-icon">📅</span> My Events</a>
      <a class="nav-item" href="/manager/assistants.html"><span class="nav-icon">👥</span> Assistants</a>
      <a class="nav-item" href="/manager/attendance.html"><span class="nav-icon">📍</span> Attendance</a>
      <a class="nav-item" href="/manager/sponsorship.html"><span class="nav-icon">💼</span> Sponsorship</a>
      <span class="nav-section-label">Settings</span>
      <a class="nav-item" href="/profile.html"><span class="nav-icon">⚙️</span> My Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="sidebar-avatar">M</div>
        <div class="user-info"><div class="user-name" id="sidebar-username">Manager</div><div class="user-role" id="sidebar-role">Event Manager</div></div>
      </div>
      <button class="btn btn-logout" id="logout-btn">🚪 Sign Out</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div><h1 class="page-title">My Dashboard</h1><p class="page-subtitle">Manage your events and sponsorships</p></div>
      <div class="topbar-actions">
        <a href="/manager/events.html" class="btn btn-primary">+ Create Event</a>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Events</div><div class="stat-value" id="stat-total">—</div><div class="stat-icon">📅</div></div>
      <div class="stat-card"><div class="stat-label">Approved</div><div class="stat-value" id="stat-approved">—</div><div class="stat-icon">✅</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" id="stat-pending">—</div><div class="stat-icon">⏳</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Recent Events</span>
        <a href="/manager/events.html" class="btn btn-ghost btn-sm">View All</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Title</th><th>Venue</th><th>Date</th><th>Capacity</th><th>Status</th></tr></thead>
          <tbody id="events-body">
            <tr class="loading-row"><td colspan="5"><div class="spinner" style="margin:auto"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  const user = requireRole('Event Manager');
  if (user) { populateSidebar(user); setActiveNav(); loadMyEvents(); }

  async function loadMyEvents() {
    const res = await api.get('/events/list/my');
    const tbody = document.getElementById('events-body');
    if (!res.ok) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--danger)">Failed to load</td></tr>'; return; }
    const events = res.data;
    document.getElementById('stat-total').textContent    = events.length;
    document.getElementById('stat-approved').textContent = events.filter(e => e.status === 'approved').length;
    document.getElementById('stat-pending').textContent  = events.filter(e => e.status === 'pending').length;
    if (!events.length) { tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📅</div><p>No events yet. <a href="/manager/events.html">Create one!</a></p></div></td></tr>'; return; }
    tbody.innerHTML = events.slice(0,8).map(ev => `
      <tr>
        <td><div style="font-weight:600">${ev.title}</div></td>
        <td style="color:var(--text-muted)">${ev.venue?.name || '—'}</td>
        <td style="color:var(--text-muted);white-space:nowrap">${fmtDateShort(ev.start_time)}</td>
        <td style="color:var(--text-muted)">${ev.capacity}</td>
        <td>${badge(ev.status)}</td>
      </tr>`).join('');
  }
</script>
</body>
</html>
